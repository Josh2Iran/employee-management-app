<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
.profile-box {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile-wrapper {
    position: relative;
}

.profile-pic-small {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

.status {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.status.online {
    background-color: #2ecc71;
    box-shadow: 0 0 8px #2ecc71;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.profile {
    display: flex;
    align-items: center;
    gap: 10px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
}

.title {
    margin-top: 70px;
}

.welcome-message {
    margin-top: 10px;
}
    </style>
</head>
<body>

<div class="profile-box">
    <div class="profile-wrapper">
        <img src="profile.jpg" width="40">
        <span class="status online"></span>
    </div>

    <div class="profile-info">
        <h4>Joshua Gachau</h4>
        <p>(Admin)</p>
    </div>
</div>

<nav class="navbar">
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="new-contact.html">New Contact</a></li>
        <li><a href="view-contacts.html">View All Contacts</a></li>
    </ul>

</html>
