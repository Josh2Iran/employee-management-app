<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="user-panel">
            <img src="images/profile.jpg" alt="user" referrerPolicy="no-referrer">
            <div class="user-info">
                <p>Joshua Gachau</p>
                <span class="status"><span class="status-dot"></span> Online</span>
            </div>
        </div>
        <div class="nav-header">Main Navigation</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">Add New Contact</a></li>
            <li class="active"><a href="view-contacts.html">View All Contacts</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-bar">Employee Management System</div>
        <div class="table-container">
            <table id="contactsTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Tools</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
<script src="main.js"></script>
</body>
</html>
