<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="user-panel">
            <img src="images/profile.jpg" alt="User" referrerPolicy="no-referrer">
            <div class="user-info">
                <p>Employee</p>
                <span class="status"><span class="status-dot"></span> Online</span>
            </div>
        </div>
        <div class="nav-header">Main Navigation</div>
        <ul class="nav-links">
            <li>
                <a href="index.html"><i class="fa fa-house"></i> Home</a>
            </li>
            <li class="active">
                <a href="new-contact.html"><i class="fa fa-user-plus"></i> Add New Contact</a>
            </li>
            <li>
                <a href="view-contacts.html"><i class="fa fa-address-book"></i> View All Contacts</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-bar">Employee Management System</div>
        <div class="form-container">
            <div class="form-header">Add New Contact</div>
            <form id="newContactForm" class="form-body">
                <div class="form-group">
                    <label>ID Number</label>
                    <input type="text" id="idNumber" placeholder="Enter Identification Number" required>
                </div>
                <div class="form-group">
                    <label>Firstname</label>
                    <input type="text" id="firstName" placeholder="Enter First Name" required>
                </div>
                <div class="form-group">
                    <label>Lastname</label>
                    <input type="text" id="lastName" placeholder="Enter Last Name" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="width: auto; font-weight: normal;"><input type="radio" name="gender" value="Male" checked> Male</label>
                        <label style="width: auto; font-weight: normal;"><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone" placeholder="+2547-- --- ---" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter Email" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter Address">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <select id="position">
                        <option value="">- Select Position -</option>
                        <option value="Software Developer">Software Developer</option>
                        <option value="Web Developer">Web Developer</option>
                        <option value="Data Analyst">Data Analyst</option>
                        <option value="Cybersecurity Specialist">Cybersecurity Specialist</option>
                        <option value="Computer Programmer">Computer Programmer</option>
                        <option value="Intern">Intern</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button type="submit" class="btn btn-details" style="padding: 10px 20px;">Submit Details</button>
                </div>
            </form>
        </div>
    </div>
<script src="main.js"></script>
</body>
</html>
