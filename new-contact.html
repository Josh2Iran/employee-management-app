<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="new-contact.html">New Contact</a></li>
        <li><a href="view-contacts.html">View All Contacts</a></li>
    </ul>
    <div class="profile">
            <img src="images/profile.jpg" alt="Profile" class="profile-img">
            <span class="profile-name">Joshua Gachau</span>
            <span class="profile-position">(Admin)</span><br>
            <span class="status online">Online</span>
    </div>
</nav>

<section class="form-section">
    <h1>Add New Contact</h1>

    <form id="employeeForm">
        <div>
            <label for="IDNumber">ID Number:</label>
            <input type="text" placeholder="Enter Identification Number" required>
        </div>    
        <div>
            <label for="FirstName">First name:</label>
            <input type="text" placeholder="Enter First Name" required>
        </div>
        <div>
            <label for="LastName">Last name:</label>
            <input type="text" placeholder="Enter Last Name" required>
        </div>
        
        <div class="gender-section">
            <label>Gender:</label><br>
            <input type="radio" name="gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" value="Female">
            <label for="Female">Female</label>
        </div>
        <div>
            <label for="Phone">Phone:</label>
            <input type="tel" placeholder="+2547-- --- ---" required>
        </div>
        <div>
            <label for="Email">Email:</label>
            <input type="email" placeholder="Enter Email" required>
        </div>
        <div>
            <label for="Address">Address:</label>
            <input type="text" placeholder="Enter Address" required>
        </div>
        <div>
            <label for="Date of Birth">Date of Birth:</label>
            <input type="date" required>
        </div>

        <label for="Position">Position:</label>
        <select id="postion" name="position">
            <option value="">--Select Position if Official--</option>
            <option value="Software Developer">Software Developer</option>
            <option value="Web Developer">Web Developer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Cybersecurity Specialist">Cybersecurity Specialist</option>
            <option value="Computer Programmer">Computer Programmer</option>
            <option value="Intern">Intern</option>
        </select>
        <div>
            <button type="submit">Submit</button>
        </div>

    </form>
</section>

</body>
</html>
